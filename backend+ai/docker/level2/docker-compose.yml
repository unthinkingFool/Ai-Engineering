services:

  backend:
    build: ./backend
    ports:
      - "3000:7000"
    environment:
      - PORT=7000
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "8000:5173"
    environment:
      - PORT=5173


  redis:
    image: redis
    ports:
      - "6379:6379"

  